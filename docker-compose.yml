name: jol

services:
  jol-db:
    image: postgres:16-alpine
    container_name: jol-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-juridicoonline}
    volumes:
      - jol-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5470:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jol} -d ${POSTGRES_DB:-juridicoonline}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jol-net

  jol-redis:
    image: redis:7-alpine
    container_name: jol-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - jol-redis-data:/data
    ports:
      - "127.0.0.1:6390:6379"
    networks:
      - jol-net

  jol-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GA4_ID: ${NEXT_PUBLIC_GA4_ID:-}
        NEXT_PUBLIC_HOTJAR_ID: ${NEXT_PUBLIC_HOTJAR_ID:-}
    container_name: jol-app
    restart: unless-stopped
    depends_on:
      jol-db:
        condition: service_healthy
      jol-redis:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-jol}:${POSTGRES_PASSWORD}@jol-db:5432/${POSTGRES_DB:-juridicoonline}?schema=public
      REDIS_URL: redis://jol-redis:6379
      AUTH_SECRET: ${AUTH_SECRET:?set in .env}
      AUTH_URL: ${AUTH_URL:-https://juridicoonline.com.br}
      AUTH_TRUST_HOST: "true"
      # MeiliSearch (NewWay)
      MEILI_HOST: ${MEILI_HOST:-http://195.35.40.29:7700}
      MEILI_KEY: ${MEILI_KEY:-masterKey}
      MEILI_INDEX: ${MEILI_INDEX:-empresas}
      # Public site
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://juridicoonline.com.br}
      NEXT_PUBLIC_SITE_NAME: "Jurídico Online"
      # Mailgun
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-mg.juridicoonline.com.br}
      MAILGUN_FROM: ${MAILGUN_FROM:-Jurídico Online <noreply@mg.juridicoonline.com.br>}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-rodrigodgbr1@gmail.com}
      BRIGHTDATA_API_KEY: ${BRIGHTDATA_API_KEY:-}
      BRIGHTDATA_ZONE: ${BRIGHTDATA_ZONE:-web_unlocker1}
      # Google OAuth (optional)
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      # Analytics (server-side runtime — não precisa de build arg)
      GA4_ID: ${GA4_ID:-${NEXT_PUBLIC_GA4_ID:-}}
      HOTJAR_ID: ${HOTJAR_ID:-${NEXT_PUBLIC_HOTJAR_ID:-}}
      NEXT_PUBLIC_CF_ANALYTICS_TOKEN: ${NEXT_PUBLIC_CF_ANALYTICS_TOKEN:-}
    ports:
      - "127.0.0.1:3470:3000"
    networks:
      - jol-net

volumes:
  jol-db-data:
  jol-redis-data:

networks:
  jol-net:
    driver: bridge
